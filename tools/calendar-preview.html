<style>
  /* Self-contained mock of your contribution calendar so you can see the
     gray-cell styling WITHOUT the live GitHub fetch. This file is only a
     visual reference — your real calendar on index.html uses the same colours. */
  body{ background:#0d1117; color:#c9d1d9; font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif; padding:2rem; }
  .wrap{ max-width:860px; margin:0 auto; }
  h2{ font-weight:400; color:#f0f6fc; }
  .note{ color:#7d8590; font-size:.9em; margin-bottom:1.5rem; }
  .cal{ border:1px solid #30363d; padding:1rem; overflow-x:auto; }
  .grid{ display:grid; grid-template-rows:repeat(7,12px); grid-auto-flow:column; grid-auto-columns:12px; gap:3px; }
  .cell{ width:12px; height:12px; background:#30363d; }         /* empty = gray */
  .l1{ background:#0e4429; } .l2{ background:#006d32; }
  .l3{ background:#26a641; } .l4{ background:#39d353; }
  .legend{ display:flex; align-items:center; gap:6px; justify-content:flex-end; margin-top:12px; color:#7d8590; font-size:12px; }
  .legend .cell{ display:inline-block; }
</style>
</head>
<body>
<div class="wrap">
  <h2>95 contributions in the last year</h2>
  <p class="note">Colour preview only (no live data). Empty days are gray <b style="color:#30363d;background:#30363d;padding:0 6px;">■</b> #30363d; contributions use the GitHub dark greens.</p>
  <div class="cal">
    <div class="grid" id="grid"></div>
    <div class="legend">
      Less
      <span class="cell"></span>
      <span class="cell l1"></span>
      <span class="cell l2"></span>
      <span class="cell l3"></span>
      <span class="cell l4"></span>
      More
    </div>
  </div>
</div>
<script>
  // 53 weeks x 7 days, mostly empty (gray) with scattered contributions
  var g = document.getElementById('grid'), lv = ['', 'l1', 'l2', 'l3', 'l4'];
  for (var i = 0; i < 53 * 7; i++) {
    var c = document.createElement('div');
    var r = Math.random();
    var level = r > 0.90 ? 4 : r > 0.83 ? 3 : r > 0.74 ? 2 : r > 0.6 ? 1 : 0;
    c.className = 'cell' + (lv[level] ? ' ' + lv[level] : '');
    g.appendChild(c);
  }
</script>
</body>
